<!DOCTYPE html>
<html lang="es" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snoutt — La red social de mascotas</title>
<meta name="description" content="Snoutt es la red social de mascotas en Panamá. Match, lugares pet-friendly, eventos y comunidad. Muy pronto.">
<meta property="og:title" content="Snoutt — La red social de mascotas">
<meta property="og:description" content="Match, lugares pet-friendly, eventos y comunidad para tu mascota. Muy pronto en Panamá.">
<meta property="og:image" content="/snoutt-logo.png">
<link rel="icon" href="/snoutt-logo.png">
<style>
  :root {
    --purple: #7C3AED;
    --purple-dark: #6D28D9;
    --teal: #0F9B8E;
    --bg: #F9F8FC;
    --text: #1F2937;
    --muted: #6B7280;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
    line-height: 1.5;
    overflow-x: hidden;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px max(20px, calc((100vw - 1100px) / 2));
    position: relative;
    z-index: 2;
  }
  .logo {
    height: 46px;
    width: 115px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }
  .logo img {
    height: 125px;
    width: auto;
    max-width: none;
    flex-shrink: 0;
    margin-left: -6px;
  }
  .lang-toggle {
    border: 0;
    border-radius: 999px;
    padding: 7px 16px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    background: #EDE9FE;
    color: var(--purple-dark);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .lang-toggle:hover { transform: translateY(-1px); background: #E0D4FC; }

  .hero {
    position: relative;
    background: linear-gradient(160deg, #6D28D9 0%, #7C3AED 45%, #0F9B8E 100%);
    color: white;
    padding: 40px 20px 130px;
    text-align: center;
    overflow: hidden;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.10);
    filter: blur(50px);
    pointer-events: none;
  }
  .blob-1 { width: 280px; height: 280px; top: -80px; left: -60px; }
  .blob-2 { width: 220px; height: 220px; bottom: 30px; right: -40px; background: rgba(255,255,255,0.08); }

  .paw {
    position: absolute;
    opacity: 0.22;
    font-size: 26px;
    animation: float 6s ease-in-out infinite;
    pointer-events: none;
    user-select: none;
  }
  .paw-1 { top: 18%; left: 8%; font-size: 30px; animation-duration: 7s; }
  .paw-2 { top: 62%; left: 5%; font-size: 22px; animation-duration: 5.5s; animation-delay: 0.6s; }
  .paw-3 { top: 22%; right: 8%; font-size: 24px; animation-duration: 6.5s; animation-delay: 1.1s; }
  .paw-4 { top: 68%; right: 10%; font-size: 32px; animation-duration: 8s; animation-delay: 0.3s; }
  .paw-5 { top: 8%; left: 45%; font-size: 18px; animation-duration: 5s; animation-delay: 1.6s; }
  @media (max-width: 680px) {
    .paw { display: none; }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-16px) rotate(8deg); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero .badge {
    position: relative;
    z-index: 1;
    display: inline-block;
    background: rgba(255,255,255,0.16);
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 22px;
    animation: fadeUp 0.6s ease both;
  }
  .hero h1 {
    position: relative;
    z-index: 1;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    margin: 0 auto 16px;
    max-width: 700px;
    animation: fadeUp 0.6s ease 0.08s both;
  }
  .hero .subtitle {
    position: relative;
    z-index: 1;
    font-size: clamp(15px, 2vw, 18px);
    opacity: 0.92;
    max-width: 540px;
    margin: 0 auto 34px;
    animation: fadeUp 0.6s ease 0.16s both;
  }
  .waitlist-form {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 10px;
    max-width: 440px;
    margin: 0 auto;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp 0.6s ease 0.24s both;
  }
  .waitlist-form input[type=email] {
    flex: 1;
    min-width: 220px;
    padding: 15px 20px;
    border-radius: 999px;
    border: 2px solid transparent;
    font-size: 15px;
    outline: none;
    transition: box-shadow 0.15s ease;
  }
  .waitlist-form input[type=email]:focus {
    box-shadow: 0 0 0 3px rgba(255,255,255,0.5);
  }
  .waitlist-form button {
    padding: 15px 28px;
    border-radius: 999px;
    border: 0;
    background: #1F2937;
    color: white;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .waitlist-form button:hover:not(:disabled) {
    transform: translateY(-2px);
    background: #111827;
  }
  .waitlist-form button:disabled { opacity: 0.6; cursor: default; }
  .form-message {
    position: relative;
    z-index: 1;
    margin-top: 16px;
    font-size: 14px;
    font-weight: 600;
    min-height: 20px;
  }
  .form-message.success { color: #D1FAE5; }
  .form-message.error { color: #FEE2E2; }

  .wave-divider {
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 100%;
    line-height: 0;
    z-index: 1;
  }
  .wave-divider svg { width: 100%; height: 90px; display: block; }

  .features {
    max-width: 1100px;
    margin: 0 auto;
    padding: 30px 20px 70px;
  }
  .features h2 {
    text-align: center;
    font-size: clamp(22px, 3vw, 30px);
    font-weight: 800;
    margin-bottom: 40px;
  }
  .feature-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 24px;
  }
  .feature-card {
    background: white;
    border-radius: 20px;
    padding: 28px 22px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .feature-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 14px 32px rgba(124,58,237,0.14);
  }
  .feature-card .icon {
    font-size: 32px;
    margin-bottom: 14px;
    display: inline-block;
  }
  .feature-card h3 { font-size: 16px; font-weight: 700; margin: 0 0 8px; }
  .feature-card p { font-size: 14px; color: var(--muted); margin: 0; }
  footer {
    text-align: center;
    padding: 30px 20px 50px;
    color: var(--muted);
    font-size: 13px;
  }
</style>
</head>
<body>
  <header>
    <div class="logo"><img src="/snoutt-logo.png" alt="Snoutt"></div>
    <button class="lang-toggle" id="lang-toggle" type="button">EN</button>
  </header>

  <section class="hero">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <span class="paw paw-1">🐾</span>
    <span class="paw paw-2">🐾</span>
    <span class="paw paw-3">🐾</span>
    <span class="paw paw-4">🐾</span>
    <span class="paw paw-5">🐾</span>

    <span class="badge" data-i18n="badge"></span>
    <h1 data-i18n="title"></h1>
    <p class="subtitle" data-i18n="subtitle"></p>

    <form class="waitlist-form" id="waitlist-form">
      <input type="email" id="email-input" data-i18n-placeholder="emailPlaceholder" required>
      <button type="submit" id="submit-btn" data-i18n="button"></button>
    </form>
    <p class="form-message" id="form-message"></p>

    <div class="wave-divider">
      <svg viewBox="0 0 1440 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path fill="#F9F8FC" d="M0,40 C240,90 480,0 720,30 C960,60 1200,10 1440,50 L1440,100 L0,100 Z"></path>
      </svg>
    </div>
  </section>

  <section class="features">
    <h2 data-i18n="featuresTitle"></h2>
    <div class="feature-grid">
      <div class="feature-card">
        <div class="icon">❤️</div>
        <h3 data-i18n="f1t"></h3>
        <p data-i18n="f1d"></p>
      </div>
      <div class="feature-card">
        <div class="icon">📍</div>
        <h3 data-i18n="f2t"></h3>
        <p data-i18n="f2d"></p>
      </div>
      <div class="feature-card">
        <div class="icon">💬</div>
        <h3 data-i18n="f3t"></h3>
        <p data-i18n="f3d"></p>
      </div>
      <div class="feature-card">
        <div class="icon">🎉</div>
        <h3 data-i18n="f4t"></h3>
        <p data-i18n="f4d"></p>
      </div>
      <div class="feature-card">
        <div class="icon">💉</div>
        <h3 data-i18n="f5t"></h3>
        <p data-i18n="f5d"></p>
      </div>
      <div class="feature-card">
        <div class="icon">🐾</div>
        <h3 data-i18n="f6t"></h3>
        <p data-i18n="f6d"></p>
      </div>
    </div>
  </section>

  <footer id="footer"></footer>

<script>
  const SUPABASE_URL = 'https://pvlaruqwbaxdpdndwfvh.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2bGFydXF3YmF4ZHBkbmR3ZnZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODQ3NzUsImV4cCI6MjA5Njc2MDc3NX0.jc4mg206OGW0kEMS_0OGvx9cbAkS-5UfKRfG8ob8tLc'
  const YEAR = new Date().getFullYear()

  const translations = {
    es: {
      badge: 'Muy pronto en Panamá 🐾',
      title: 'La red social hecha para tu mascota',
      subtitle: 'Match, lugares pet-friendly, eventos y una comunidad que entiende a tu mejor amigo. Únete a la lista de espera y sé de los primeros en probar Snoutt.',
      emailPlaceholder: 'tu@email.com',
      button: 'Unirme a la lista',
      sending: 'Enviando...',
      success: '¡Listo! Te avisaremos apenas Snoutt esté disponible 🐾',
      duplicate: 'Ya estás en la lista, ¡gracias!',
      error: 'Algo salió mal, intenta de nuevo.',
      featuresTitle: 'Qué vas a encontrar',
      f1t: 'Match', f1d: 'Conecta a tu mascota con otras cerca de ti, con filtros por raza, tamaño y zona.',
      f2t: 'Lugares pet-friendly', f2d: 'Veterinarias, parques, pet shops y más, cerca de ti y con reseñas reales.',
      f3t: 'Chat en tiempo real', f3d: 'Habla con otros dueños después de hacer match, comparte fotos y videos.',
      f4t: 'Eventos', f4d: 'Paseos grupales, meetups y ferias organizadas por la comunidad.',
      f5t: 'Cartilla de vacunas', f5d: 'Lleva el registro de vacunas de tu mascota, todo en un solo lugar.',
      f6t: 'Comunidad', f6d: 'Comparte momentos, sigue a otras mascotas y descubre historias del barrio.',
      footer: '© ' + YEAR + ' Snoutt. Hecho con 🐾 en Panamá.',
      toggleLabel: 'EN',
      htmlLang: 'es',
    },
    en: {
      badge: 'Coming soon to Panama 🐾',
      title: 'The social network made for your pet',
      subtitle: "Match, pet-friendly places, events, and a community that gets your best friend. Join the waitlist and be among the first to try Snoutt.",
      emailPlaceholder: 'you@email.com',
      button: 'Join the waitlist',
      sending: 'Sending...',
      success: "You're in! We'll let you know as soon as Snoutt is ready 🐾",
      duplicate: "You're already on the list, thanks!",
      error: 'Something went wrong, try again.',
      featuresTitle: "What you'll find",
      f1t: 'Match', f1d: 'Connect your pet with others nearby, with filters for breed, size, and area.',
      f2t: 'Pet-friendly places', f2d: 'Vets, parks, pet shops and more nearby, with real reviews.',
      f3t: 'Real-time chat', f3d: 'Talk to other owners after matching, share photos and videos.',
      f4t: 'Events', f4d: 'Group walks, meetups and fairs organized by the community.',
      f5t: 'Vaccine record', f5d: "Keep track of your pet's vaccines, all in one place.",
      f6t: 'Community', f6d: 'Share moments, follow other pets, and discover neighborhood stories.',
      footer: '© ' + YEAR + ' Snoutt. Made with 🐾 in Panama.',
      toggleLabel: 'ES',
      htmlLang: 'en',
    },
  }

  let lang = 'es'

  function render() {
    const dict = translations[lang]
    document.getElementById('html-root').lang = dict.htmlLang
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n')
      if (dict[key] !== undefined) el.textContent = dict[key]
    })
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder')
      if (dict[key] !== undefined) el.placeholder = dict[key]
    })
    document.getElementById('lang-toggle').textContent = dict.toggleLabel
    document.getElementById('footer').textContent = dict.footer
  }

  document.getElementById('lang-toggle').addEventListener('click', () => {
    lang = lang === 'es' ? 'en' : 'es'
    render()
  })

  render()

  const form = document.getElementById('waitlist-form')
  const emailInput = document.getElementById('email-input')
  const submitBtn = document.getElementById('submit-btn')
  const messageEl = document.getElementById('form-message')

  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    const email = emailInput.value.trim()
    if (!email) return

    const dict = translations[lang]
    submitBtn.disabled = true
    submitBtn.textContent = dict.sending
    messageEl.textContent = ''
    messageEl.className = 'form-message'

    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/waitlist', {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify({ email }),
      })

      if (res.ok) {
        messageEl.textContent = dict.success
        messageEl.className = 'form-message success'
        emailInput.value = ''
      } else if (res.status === 409) {
        messageEl.textContent = dict.duplicate
        messageEl.className = 'form-message success'
      } else {
        messageEl.textContent = dict.error
        messageEl.className = 'form-message error'
      }
    } catch (err) {
      messageEl.textContent = dict.error
      messageEl.className = 'form-message error'
    }

    submitBtn.disabled = false
    submitBtn.textContent = dict.button
  })
</script>
</body>
</html>
