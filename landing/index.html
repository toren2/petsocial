<style>
  :root {
    --purple: #7C3AED;
    --purple-dark: #6D28D9;
    --teal: #0F9B8E;
    --bg: #F9F8FC;
    --text: #1F2937;
    --muted: #6B7280;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
    line-height: 1.5;
    overflow-x: hidden;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px max(20px, calc((100vw - 1100px) / 2));
    position: relative;
    z-index: 2;
  }
  .logo {
    height: 46px;
    width: 115px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo img {
    height: 126px;
    width: auto;
    max-width: none;
    flex-shrink: 0;
  }
  .lang-toggle {
    border: 0;
    border-radius: 999px;
    padding: 7px 16px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    background: #EDE9FE;
    color: var(--purple-dark);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .lang-toggle:hover { transform: translateY(-1px); background: #E0D4FC; }

  .hero {
    position: relative;
    background: linear-gradient(160deg, #6D28D9 0%, #7C3AED 45%, #0F9B8E 100%);
    color: white;
    padding: 40px 20px 130px;
    text-align: center;
    overflow: hidden;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.10);
    filter: blur(50px);
    pointer-events: none;
  }
  .blob-1 { width: 280px; height: 280px; top: -80px; left: -60px; }
  .blob-2 { width: 220px; height: 220px; bottom: 30px; right: -40px; background: rgba(255,255,255,0.08); }

  .paw {
    position: absolute;
    opacity: 0.22;
    font-size: 26px;
    animation: float 6s ease-in-out infinite;
    pointer-events: none;
    user-select: none;
  }
  .paw-1 { top: 18%; left: 8%; font-size: 30px; animation-duration: 7s; }
  .paw-2 { top: 62%; left: 5%; font-size: 22px; animation-duration: 5.5s; animation-delay: 0.6s; }
  .paw-3 { top: 22%; right: 8%; font-size: 24px; animation-duration: 6.5s; animation-delay: 1.1s; }
  .paw-4 { top: 68%; right: 10%; font-size: 32px; animation-duration: 8s; animation-delay: 0.3s; }
  .paw-5 { top: 8%; left: 45%; font-size: 18px; animation-duration: 5s; animation-delay: 1.6s; }
  @media (max-width: 680px) {
    .paw { display: none; }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-16px) rotate(8deg); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero .badge {
    position: relative;
    z-index: 1;
    display: inline-block;
    background: rgba(255,255,255,0.16);
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 22px;
    animation: fadeUp 0.6s ease both;
  }
  .hero h1 {
    position: relative;
    z-index: 1;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    margin: 0 auto 16px;
    max-width: 700px;
    animation: fadeUp 0.6s ease 0.08s both;
  }
  .hero .subtitle {
    position: relative;
    z-index: 1;
    font-size: clamp(15px, 2vw, 18px);
    opacity: 0.92;
    max-width: 540px;
    margin: 0 auto 34px;
    animation: fadeUp 0.6s ease 0.16s both;
  }
  .app-cta {
    position: relative;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: white;
    color: var(--purple-dark);
    text-decoration: none;
    font-weight: 800;
    font-size: 16px;
    padding: 16px 32px;
    border-radius: 999px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    margin-bottom: 14px;
    animation: fadeUp 0.6s ease 0.2s both;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .app-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.2);
  }
  .app-cta-note {
    position: relative;
    z-index: 1;
    font-size: 13px;
    opacity: 0.85;
    margin: 0 0 26px;
    animation: fadeUp 0.6s ease 0.22s both;
  }
  .waitlist-divider {
    position: relative;
    z-index: 1;
    font-size: 12px;
    opacity: 0.7;
    margin: 0 0 18px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
  }
  .waitlist-form {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 10px;
    max-width: 440px;
    margin: 0 auto;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp 0.6s ease 0.24s both;
  }
  .waitlist-form input[type=email] {
    flex: 1;
    min-width: 220px;
    padding: 15px 20px;
    border-radius: 999px;
    border: 2px solid transparent;
    font-size: 15px;
    outline: none;
    transition: box-shadow 0.15s ease;
  }
  .waitlist-form input[type=email]:focus {
    box-shadow: 0 0 0 3px rgba(255,255,255,0.5);
  }
  .waitlist-form button {
    padding: 15px 28px;
    border-radius: 999px;
    border: 0;
    background: #1F2937;
    color: white;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .waitlist-form button:hover:not(:disabled) {
    transform: translateY(-2px);
    background: #111827;
  }
  .waitlist-form button:disabled { opacity: 0.6; cursor: default; }
  .form-message {
    position: relative;
    z-index: 1;
    margin-top: 16px;
    font-size: 14px;
    font-weight: 600;
    min-height: 20px;
  }
  .form-message.success { color: #D1FAE5; }
  .form-message.error { color: #FEE2E2; }

  .wave-divider {
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 100%;
    line-height: 0;
    z-index: 1;
  }
  .wave-divider svg { width: 100%; height: 90px; display: block; }

  .features {
    max-width: 1100px;
    margin: 0 auto;
    padding: 30px 20px 70px;
  }
  .features h2 {
    text-align: center;
    font-size: clamp(22px, 3vw, 30px);
    font-weight: 800;
    margin-bottom: 40px;
  }
  .feature-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 24px;
  }
  .feature-card {
    background: white;
    border-radius: 20px;
    padding: 28px 22px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .feature-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 14px 32px rgba(124,58,237,0.14);
  }
  .feature-card .icon {
    font-size: 32px;
    margin-bottom: 14px;
    display: inline-block;
  }
  .feature-card h3 { font-size: 16px; font-weight: 700; margin: 0 0 8px; }
  .feature-card p { font-size: 14px; color: var(--muted); margin: 0; }
  footer {
    text-align: center;
    padding: 30px 20px 50px;
    color: var(--muted);
    font-size: 13px;
  }
  footer .footer-contact {
    display: inline-block;
    margin-top: 10px;
  }
  footer .footer-contact a {
    color: var(--purple-dark);
    text-decoration: none;
    font-weight: 700;
    font-size: 13px;
    border: 1.5px solid #E0D4FC;
    border-radius: 999px;
    padding: 6px 16px;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  footer .footer-contact a:hover {
    background: #EDE9FE;
    transform: translateY(-1px);
  }
  footer .footer-contact button {
    color: var(--purple-dark);
    background: none;
    text-decoration: none;
    font-weight: 700;
    font-size: 13px;
    font-family: inherit;
    border: 1.5px solid #E0D4FC;
    border-radius: 999px;
    padding: 6px 16px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  footer .footer-contact button:hover {
    background: #EDE9FE;
    transform: translateY(-1px);
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(31,41,55,0.5);
    z-index: 10;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: white;
    border-radius: 20px;
    padding: 28px 24px;
    max-width: 400px;
    width: 100%;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    background: none;
    border: 0;
    font-size: 20px;
    cursor: pointer;
    color: var(--muted);
    line-height: 1;
  }
  .modal-box h3 {
    margin: 0 0 18px;
    font-size: 18px;
    font-weight: 800;
    padding-right: 20px;
  }
  .contact-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .contact-form input,
  .contact-form textarea {
    padding: 12px 14px;
    border-radius: 12px;
    border: 1.5px solid #E5E7EB;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    resize: vertical;
    transition: border-color 0.15s ease;
  }
  .contact-form input:focus,
  .contact-form textarea:focus {
    border-color: var(--purple);
  }
  .contact-form textarea { min-height: 90px; }
  .contact-form button {
    margin-top: 4px;
    padding: 13px 20px;
    border-radius: 999px;
    border: 0;
    background: var(--purple);
    color: white;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  .contact-form button:hover:not(:disabled) {
    background: var(--purple-dark);
    transform: translateY(-1px);
  }
  .contact-form button:disabled { opacity: 0.6; cursor: default; }
  .contact-message {
    margin-top: 12px;
    font-size: 13px;
    font-weight: 600;
    min-height: 18px;
  }
  .contact-message.success { color: #0F9B8E; }
  .contact-message.error { color: #DC2626; }
</style>

    submitBtn.disabled = true
    submitBtn.textContent = dict.sending
    messageEl.textContent = ''
    messageEl.className = 'form-message'

    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/waitlist', {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify({ email }),
      })

      if (res.ok) {
        messageEl.textContent = dict.success
        messageEl.className = 'form-message success'
        emailInput.value = ''
      } else if (res.status === 409) {
        messageEl.textContent = dict.duplicate
        messageEl.className = 'form-message success'
      } else {
        messageEl.textContent = dict.error
        messageEl.className = 'form-message error'
      }
    } catch (err) {
      messageEl.textContent = dict.error
      messageEl.className = 'form-message error'
    }

    submitBtn.disabled = false
    submitBtn.textContent = dict.button
  })

  function openContactModal() {
    document.getElementById('contact-modal').classList.add('open')
  }
  function closeContactModal() {
    document.getElementById('contact-modal').classList.remove('open')
  }
  document.getElementById('contact-modal').addEventListener('click', (e) => {
    if (e.target.id === 'contact-modal') closeContactModal()
  })

  const contactForm = document.getElementById('contact-form')
  const contactSubmitBtn = document.getElementById('contact-submit-btn')
  const contactMessageEl = document.getElementById('contact-form-message')

  contactForm.addEventListener('submit', async (e) => {
    e.preventDefault()
    const dict = translations[lang]
    const name = document.getElementById('contact-name').value.trim()
    const email = document.getElementById('contact-email').value.trim()
    const message = document.getElementById('contact-message-input').value.trim()
    if (!name || !email || !message) return

    contactSubmitBtn.disabled = true
    contactSubmitBtn.textContent = dict.contactSending
    contactMessageEl.textContent = ''
    contactMessageEl.className = 'contact-message'

    try {
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        name: name,
        email: email,
        message: message,
        title: 'Formulario de contacto - Snoutt',
        time: new Date().toLocaleString('es-PA', { timeZone: 'America/Panama' }),
      })
      contactMessageEl.textContent = dict.contactSuccess
      contactMessageEl.className = 'contact-message success'
      contactForm.reset()
    } catch (err) {
      contactMessageEl.textContent = dict.contactError
      contactMessageEl.className = 'contact-message error'
    }

    contactSubmitBtn.disabled = false
    contactSubmitBtn.textContent = dict.contactSend
  })
</script>
</body>
</html>
